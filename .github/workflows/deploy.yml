name: Deploy to GitHub Pages

on:
  # 触发条件：当向 main 分支推送代码时，或手动触发时
  push:
    branches: ["main"]
  workflow_dispatch:

# 配置权限，允许 Actions 读取仓库并写入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制，避免多个部署任务冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4
      
      # 这里可以添加安装依赖和构建项目的步骤，例如：
      # - name: 安装依赖并构建
      #   run: |
      #     npm install
      #     npm run build
      
      - name: 📦 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          # 指定你构建好的静态文件所在的文件夹，例如 './dist' 或 './build'
          path: "./dist" 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
